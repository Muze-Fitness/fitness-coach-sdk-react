plugins {
  id 'com.android.library'
  id 'org.jetbrains.kotlin.android'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.zingsdk'
version = '1.0.0'

android {
  namespace 'expo.modules.zingsdk'
  compileSdk 36

  defaultConfig {
    minSdk 26
    versionCode 1
    versionName '1.0.0'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  api 'coach.zing:fitness-sdk:1.5.0'
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
}
